name: Project Automation – Integration Tests

# Run manually from Actions tab, or automatically on changes to the automation
# workflow itself.
# Last triggered: 2026-03-26
#
# What this tests
# ───────────────
#  T1  New issue appears in project with Status = "Todo"
#  T2  Applying label "in-progress" flips Status → "In Progress"
#  T3  Closing the issue flips Status → "Done"
#  T4  New draft PR appears in project with Status = "In Progress"
#  T5  PR marked ready-for-review flips Status → "In Review"
#  T6  PR closed flips Status → "Done"
#
# Requirements: ADD_TO_PROJECT_PAT + PROJECT_URL (same as automation workflow)

on:
  workflow_dispatch:
    inputs:
      cleanup:
        description: 'Delete test artifacts after run (close issue + delete branch)'
        required: false
        default: 'true'
        type: boolean
  push:
    paths:
      - '.github/workflows/project-automation.yml'
      - '.github/workflows/project-automation-test.yml'
    branches: ['main', 'claude/*']

jobs:
  test:
    name: Run integration tests
    runs-on: ubuntu-latest
    # Skip silently when required secrets/vars aren't configured yet.
    if: ${{ secrets.ADD_TO_PROJECT_PAT != '' && vars.PROJECT_URL != '' }}
    env:
      GH_TOKEN: ${{ secrets.ADD_TO_PROJECT_PAT }}
      REPO: ${{ github.repository }}
      PROJECT_URL: ${{ vars.PROJECT_URL }}
    outputs:
      issue-number: ${{ steps.create-issue.outputs.number }}
      branch-name: ${{ steps.create-branch.outputs.name }}
      pr-number: ${{ steps.create-pr.outputs.number }}

    steps:
      # ── Pre-flight: check required config ───────────────────────────────────
      - name: Check required secrets and variables
        run: |
          MISSING=0
          if [[ -z "$GH_TOKEN" ]]; then
            echo "❌ Secret ADD_TO_PROJECT_PAT is not set."
            echo "   Go to: Settings → Secrets and variables → Actions → New repository secret"
            MISSING=1
          else
            echo "✓ ADD_TO_PROJECT_PAT is set"
          fi
          if [[ -z "$PROJECT_URL" ]]; then
            echo "❌ Variable PROJECT_URL is not set."
            echo "   Go to: Settings → Secrets and variables → Actions → Variables → New repository variable"
            echo "   Value example: https://github.com/users/xqicxx/projects/1"
            MISSING=1
          else
            echo "✓ PROJECT_URL = $PROJECT_URL"
          fi
          if [[ $MISSING -eq 1 ]]; then
            echo ""
            echo "Please configure the above and re-run the workflow."
            exit 1
          fi

      # ── Helpers ─────────────────────────────────────────────────────────────
      - name: Resolve project metadata
        id: meta
        run: |
          PROJECT_NUMBER=$(echo "$PROJECT_URL" | grep -oP '(?<=/projects/)\d+')
          OWNER=$(echo "$PROJECT_URL" | grep -oP '(?<=(users|orgs)/)[^/]+')
          OWNER_TYPE=$(echo "$PROJECT_URL" | grep -oP '(users|orgs)')

          [[ "$OWNER_TYPE" == "users" ]] \
            && OWNER_QUERY="user(login: \"$OWNER\")" \
            || OWNER_QUERY="organization(login: \"$OWNER\")"

          echo "number=$PROJECT_NUMBER"   >> "$GITHUB_OUTPUT"
          echo "owner=$OWNER"             >> "$GITHUB_OUTPUT"
          echo "owner-type=$OWNER_TYPE"   >> "$GITHUB_OUTPUT"
          echo "owner-query=$OWNER_QUERY" >> "$GITHUB_OUTPUT"

          FIELD_DATA=$(gh api graphql -f query="
            query {
              $OWNER_QUERY {
                projectV2(number: $PROJECT_NUMBER) {
                  id
                  field(name: \"Status\") {
                    ... on ProjectV2SingleSelectField {
                      id
                      options { id name }
                    }
                  }
                }
              }
            }
          ")
          echo "project-id=$(echo "$FIELD_DATA" | \
            jq -r '.data | to_entries[0].value.projectV2.id')" \
            >> "$GITHUB_OUTPUT"
          echo "field-id=$(echo "$FIELD_DATA" | \
            jq -r '.data | to_entries[0].value.projectV2.field.id')" \
            >> "$GITHUB_OUTPUT"
          echo "options=$(echo "$FIELD_DATA" | \
            jq -c '.data | to_entries[0].value.projectV2.field.options')" \
            >> "$GITHUB_OUTPUT"

          echo "Project #$PROJECT_NUMBER  id=$(echo $FIELD_DATA | jq -r '.data | to_entries[0].value.projectV2.id')"
          echo "Status options: $(echo $FIELD_DATA | jq -r '.data | to_entries[0].value.projectV2.field.options[].name')"

      # ── T1: New issue → "Todo" ───────────────────────────────────────────────
      - name: '[T1] Create test issue'
        id: create-issue
        run: |
          NUMBER=$(gh issue create \
            --repo "$REPO" \
            --title "[test] Project automation smoke test $(date -u +%Y%m%dT%H%M%SZ)" \
            --body "Auto-generated by project-automation-test workflow. Safe to close." \
            --label "test" \
            | grep -oP '(?<=/issues/)\d+')
          echo "number=$NUMBER" >> "$GITHUB_OUTPUT"
          echo "Created issue #$NUMBER"

      - name: '[T1] Wait for automation (30 s)'
        run: sleep 30

      - name: '[T1] Assert issue is in project with Status=Todo'
        env:
          ISSUE_NUMBER: ${{ steps.create-issue.outputs.number }}
          PROJECT_ID: ${{ steps.meta.outputs.project-id }}
          OWNER_QUERY: ${{ steps.meta.outputs.owner-query }}
          PROJECT_NUMBER: ${{ steps.meta.outputs.number }}
          OPTIONS: ${{ steps.meta.outputs.options }}
        run: |
          ITEMS=$(gh api graphql -f query="
            query {
              $OWNER_QUERY {
                projectV2(number: $PROJECT_NUMBER) {
                  items(first: 100) {
                    nodes {
                      id
                      content {
                        ... on Issue { number }
                      }
                      fieldValues(first: 20) {
                        nodes {
                          ... on ProjectV2ItemFieldSingleSelectValue {
                            name
                            field { ... on ProjectV2FieldCommon { name } }
                          }
                        }
                      }
                    }
                  }
                }
              }
            }
          ")

          ITEM=$(echo "$ITEMS" | jq --argjson n "$ISSUE_NUMBER" \
            '.data | to_entries[0].value.projectV2.items.nodes[]
             | select(.content.number == $n)')

          if [[ -z "$ITEM" || "$ITEM" == "null" ]]; then
            echo "❌ T1 FAIL: issue #$ISSUE_NUMBER not found in project"
            exit 1
          fi
          echo "✓ T1 PASS: issue #$ISSUE_NUMBER is in project"

          STATUS=$(echo "$ITEM" | jq -r \
            '.fieldValues.nodes[] | select(.field.name == "Status") | .name // empty')
          echo "   Status = '${STATUS:-<not set>}'"
          if [[ "$STATUS" == "Todo" ]]; then
            echo "✓ T1 PASS: Status = Todo"
          else
            echo "⚠ T1 WARN: expected Status='Todo', got '${STATUS:-<not set>}'"
          fi

      # ── T2: label "in-progress" → "In Progress" ──────────────────────────────
      - name: '[T2] Apply label "in-progress"'
        env:
          ISSUE_NUMBER: ${{ steps.create-issue.outputs.number }}
        run: |
          gh label create "in-progress" --repo "$REPO" --color "0075ca" \
            --description "Work in progress" 2>/dev/null || true
          gh issue edit "$ISSUE_NUMBER" --repo "$REPO" --add-label "in-progress"
          echo "Applied label 'in-progress' to issue #$ISSUE_NUMBER"

      - name: '[T2] Wait for automation (30 s)'
        run: sleep 30

      - name: '[T2] Assert Status = In Progress'
        env:
          ISSUE_NUMBER: ${{ steps.create-issue.outputs.number }}
          OWNER_QUERY: ${{ steps.meta.outputs.owner-query }}
          PROJECT_NUMBER: ${{ steps.meta.outputs.number }}
        run: |
          STATUS=$(gh api graphql -f query="
            query {
              $OWNER_QUERY {
                projectV2(number: $PROJECT_NUMBER) {
                  items(first: 100) {
                    nodes {
                      content { ... on Issue { number } }
                      fieldValues(first: 20) {
                        nodes {
                          ... on ProjectV2ItemFieldSingleSelectValue {
                            name
                            field { ... on ProjectV2FieldCommon { name } }
                          }
                        }
                      }
                    }
                  }
                }
              }
            }
          " | jq -r --argjson n "$ISSUE_NUMBER" \
            '.data | to_entries[0].value.projectV2.items.nodes[]
             | select(.content.number == $n)
             | .fieldValues.nodes[]
             | select(.field.name == "Status") | .name // empty')

          echo "   Status = '${STATUS:-<not set>}'"
          if [[ "$STATUS" == "In Progress" ]]; then
            echo "✓ T2 PASS: Status = In Progress"
          else
            echo "⚠ T2 WARN: expected 'In Progress', got '${STATUS:-<not set>}'"
          fi

      # ── T3: close issue → "Done" ─────────────────────────────────────────────
      - name: '[T3] Close test issue'
        env:
          ISSUE_NUMBER: ${{ steps.create-issue.outputs.number }}
        run: |
          gh issue close "$ISSUE_NUMBER" --repo "$REPO" \
            --comment "Closed by project-automation integration test."

      - name: '[T3] Wait for automation (30 s)'
        run: sleep 30

      - name: '[T3] Assert Status = Done'
        env:
          ISSUE_NUMBER: ${{ steps.create-issue.outputs.number }}
          OWNER_QUERY: ${{ steps.meta.outputs.owner-query }}
          PROJECT_NUMBER: ${{ steps.meta.outputs.number }}
        run: |
          STATUS=$(gh api graphql -f query="
            query {
              $OWNER_QUERY {
                projectV2(number: $PROJECT_NUMBER) {
                  items(first: 100) {
                    nodes {
                      content { ... on Issue { number } }
                      fieldValues(first: 20) {
                        nodes {
                          ... on ProjectV2ItemFieldSingleSelectValue {
                            name
                            field { ... on ProjectV2FieldCommon { name } }
                          }
                        }
                      }
                    }
                  }
                }
              }
            }
          " | jq -r --argjson n "$ISSUE_NUMBER" \
            '.data | to_entries[0].value.projectV2.items.nodes[]
             | select(.content.number == $n)
             | .fieldValues.nodes[]
             | select(.field.name == "Status") | .name // empty')

          echo "   Status = '${STATUS:-<not set>}'"
          if [[ "$STATUS" == "Done" ]]; then
            echo "✓ T3 PASS: Status = Done"
          else
            echo "⚠ T3 WARN: expected 'Done', got '${STATUS:-<not set>}'"
          fi

      # ── T4: draft PR → "In Progress" ─────────────────────────────────────────
      - name: '[T4] Create test branch'
        id: create-branch
        run: |
          BRANCH="test/project-automation-$(date -u +%Y%m%dT%H%M%SZ)"
          echo "name=$BRANCH" >> "$GITHUB_OUTPUT"
          SHA=$(gh api repos/$REPO/git/ref/heads/main \
            | jq -r '.object.sha')
          gh api repos/$REPO/git/refs \
            -f ref="refs/heads/$BRANCH" \
            -f sha="$SHA"
          echo "Created branch $BRANCH"

      - name: '[T4] Create test file on branch'
        env:
          BRANCH: ${{ steps.create-branch.outputs.name }}
        run: |
          gh api repos/$REPO/contents/.github/.project-test-$(date -u +%s) \
            --method PUT \
            -f message="chore(test): project automation test file" \
            -f content="$(echo 'test' | base64)" \
            -f branch="$BRANCH"

      - name: '[T4] Open draft PR'
        id: create-pr
        env:
          BRANCH: ${{ steps.create-branch.outputs.name }}
        run: |
          NUMBER=$(gh pr create \
            --repo "$REPO" \
            --title "[test] Project automation PR test $(date -u +%Y%m%dT%H%M%SZ)" \
            --body "Auto-generated by project-automation-test workflow. Safe to close." \
            --base main \
            --head "$BRANCH" \
            --draft \
            | grep -oP '(?<=/pull/)\d+')
          echo "number=$NUMBER" >> "$GITHUB_OUTPUT"
          echo "Created draft PR #$NUMBER"

      - name: '[T4] Wait for automation (30 s)'
        run: sleep 30

      - name: '[T4] Assert draft PR is in project with Status=In Progress'
        env:
          PR_NUMBER: ${{ steps.create-pr.outputs.number }}
          OWNER_QUERY: ${{ steps.meta.outputs.owner-query }}
          PROJECT_NUMBER: ${{ steps.meta.outputs.number }}
        run: |
          STATUS=$(gh api graphql -f query="
            query {
              $OWNER_QUERY {
                projectV2(number: $PROJECT_NUMBER) {
                  items(first: 100) {
                    nodes {
                      content { ... on PullRequest { number } }
                      fieldValues(first: 20) {
                        nodes {
                          ... on ProjectV2ItemFieldSingleSelectValue {
                            name
                            field { ... on ProjectV2FieldCommon { name } }
                          }
                        }
                      }
                    }
                  }
                }
              }
            }
          " | jq -r --argjson n "$PR_NUMBER" \
            '.data | to_entries[0].value.projectV2.items.nodes[]
             | select(.content.number == $n)
             | .fieldValues.nodes[]
             | select(.field.name == "Status") | .name // empty')

          echo "   PR #$PR_NUMBER Status = '${STATUS:-<not set>}'"
          if [[ "$STATUS" == "In Progress" ]]; then
            echo "✓ T4 PASS: Status = In Progress"
          else
            echo "⚠ T4 WARN: expected 'In Progress', got '${STATUS:-<not set>}'"
          fi

      # ── T5: mark ready for review → "In Review" ──────────────────────────────
      - name: '[T5] Mark PR ready for review'
        env:
          PR_NUMBER: ${{ steps.create-pr.outputs.number }}
        run: |
          gh pr ready "$PR_NUMBER" --repo "$REPO"
          echo "Marked PR #$PR_NUMBER ready for review"

      - name: '[T5] Wait for automation (30 s)'
        run: sleep 30

      - name: '[T5] Assert Status = In Review'
        env:
          PR_NUMBER: ${{ steps.create-pr.outputs.number }}
          OWNER_QUERY: ${{ steps.meta.outputs.owner-query }}
          PROJECT_NUMBER: ${{ steps.meta.outputs.number }}
        run: |
          STATUS=$(gh api graphql -f query="
            query {
              $OWNER_QUERY {
                projectV2(number: $PROJECT_NUMBER) {
                  items(first: 100) {
                    nodes {
                      content { ... on PullRequest { number } }
                      fieldValues(first: 20) {
                        nodes {
                          ... on ProjectV2ItemFieldSingleSelectValue {
                            name
                            field { ... on ProjectV2FieldCommon { name } }
                          }
                        }
                      }
                    }
                  }
                }
              }
            }
          " | jq -r --argjson n "$PR_NUMBER" \
            '.data | to_entries[0].value.projectV2.items.nodes[]
             | select(.content.number == $n)
             | .fieldValues.nodes[]
             | select(.field.name == "Status") | .name // empty')

          echo "   PR #$PR_NUMBER Status = '${STATUS:-<not set>}'"
          if [[ "$STATUS" == "In Review" ]]; then
            echo "✓ T5 PASS: Status = In Review"
          else
            echo "⚠ T5 WARN: expected 'In Review', got '${STATUS:-<not set>}'"
          fi

      # ── T6: close PR → "Done" ────────────────────────────────────────────────
      - name: '[T6] Close test PR'
        env:
          PR_NUMBER: ${{ steps.create-pr.outputs.number }}
        run: |
          gh pr close "$PR_NUMBER" --repo "$REPO" \
            --comment "Closed by project-automation integration test."

      - name: '[T6] Wait for automation (30 s)'
        run: sleep 30

      - name: '[T6] Assert Status = Done'
        env:
          PR_NUMBER: ${{ steps.create-pr.outputs.number }}
          OWNER_QUERY: ${{ steps.meta.outputs.owner-query }}
          PROJECT_NUMBER: ${{ steps.meta.outputs.number }}
        run: |
          STATUS=$(gh api graphql -f query="
            query {
              $OWNER_QUERY {
                projectV2(number: $PROJECT_NUMBER) {
                  items(first: 100) {
                    nodes {
                      content { ... on PullRequest { number } }
                      fieldValues(first: 20) {
                        nodes {
                          ... on ProjectV2ItemFieldSingleSelectValue {
                            name
                            field { ... on ProjectV2FieldCommon { name } }
                          }
                        }
                      }
                    }
                  }
                }
              }
            }
          " | jq -r --argjson n "$PR_NUMBER" \
            '.data | to_entries[0].value.projectV2.items.nodes[]
             | select(.content.number == $n)
             | .fieldValues.nodes[]
             | select(.field.name == "Status") | .name // empty')

          echo "   PR #$PR_NUMBER Status = '${STATUS:-<not set>}'"
          if [[ "$STATUS" == "Done" ]]; then
            echo "✓ T6 PASS: Status = Done"
          else
            echo "⚠ T6 WARN: expected 'Done', got '${STATUS:-<not set>}'"
          fi

      # ── Summary ──────────────────────────────────────────────────────────────
      - name: Print test summary
        if: always()
        run: |
          echo ""
          echo "══════════════════════════════════════"
          echo "  Project Automation – Test Summary"
          echo "══════════════════════════════════════"
          echo "  T1  issue opened        → Todo"
          echo "  T2  label 'in-progress' → In Progress"
          echo "  T3  issue closed        → Done"
          echo "  T4  draft PR opened     → In Progress"
          echo "  T5  PR ready-for-review → In Review"
          echo "  T6  PR closed           → Done"
          echo ""
          echo "Check each step above for ✓ PASS / ⚠ WARN."
          echo "WARN means automation ran but Status column"
          echo "name may differ from your board's actual names."

  # ── Cleanup ──────────────────────────────────────────────────────────────────
  cleanup:
    name: Delete test branch
    runs-on: ubuntu-latest
    needs: test
    if: |
      always() &&
      secrets.ADD_TO_PROJECT_PAT != '' &&
      vars.PROJECT_URL != '' &&
      (github.event.inputs.cleanup != 'false') &&
      needs.test.outputs.branch-name != ''
    env:
      GH_TOKEN: ${{ secrets.ADD_TO_PROJECT_PAT }}
      REPO: ${{ github.repository }}
    steps:
      - name: Delete test branch
        run: |
          BRANCH="${{ needs.test.outputs.branch-name }}"
          gh api repos/$REPO/git/refs/heads/$BRANCH \
            --method DELETE 2>/dev/null \
            && echo "✓ Deleted branch $BRANCH" \
            || echo "Branch already gone: $BRANCH"
