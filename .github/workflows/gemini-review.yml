# Gemini CLI 自动代码审查
# 文档: https://docs.github.com/zh/actions/writing-workflows
# Gemini CLI headless: https://geminicli.com/docs/cli/headless
name: Gemini Code Review

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  pull-requests: write
  contents: read

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Gemini CLI
        run: npm install -g @anthropic-ai/gemini-cli

      - name: Get PR diff
        id: diff
        run: |
          DIFF=$(git diff origin/${{ github.base_ref }}...HEAD -- '*.rs' '*.ts' '*.svelte' '*.toml')
          if [ -z "$DIFF" ]; then
            echo "No relevant changes to review"
            echo "SKIP=true" >> $GITHUB_OUTPUT
          else
            echo "SKIP=false" >> $GITHUB_OUTPUT
            echo "$DIFF" > /tmp/pr_diff.txt
          fi

      - name: Run Gemini Review
        if: steps.diff.outputs.SKIP != 'true'
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          gemini -m gemini-3.1-pro-preview \
            -p "你是 Rust + Svelte 全栈代码审查专家。审查以下 PR 的代码变更。

          ## 审查维度
          1. 安全性（密钥管理、敏感数据泄露）
          2. 代码质量（错误处理、类型安全）
          3. 架构一致性（与现有 codebase 模式是否一致）
          4. 可扩展性

          ## 输出格式
          - 每个问题标注 🔴严重 / 🟡建议 / 🟢可忽略
          - 简洁中文
          - 最后结论：可以 Merge / 需要修改

          ## 代码变更
          " < /tmp/pr_diff.txt > /tmp/review_result.txt 2>&1

      - name: Post Review Comment
        if: steps.diff.outputs.SKIP != 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let review;
            try {
              review = fs.readFileSync('/tmp/review_result.txt', 'utf8');
            } catch (e) {
              review = '⚠️ Gemini 审查生成失败，请查看 Action 日志。';
            }
            
            const body = `## 🔍 Gemini Code Review\n\n${review}`;
            
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body
            });
