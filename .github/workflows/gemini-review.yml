name: '🔎 Gemini Review'

on:
  workflow_call:
    inputs:
      additional_context:
        type: string
        description: 'Additional context for the review'
        required: false

concurrency:
  group: '${{ github.workflow }}-review-${{ github.event_name }}-${{ github.event.pull_request.number || github.event.issue.number }}'
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  review:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      id-token: write
      issues: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Gemini pull request review
        uses: google-github-actions/run-gemini-cli@v0
        id: gemini_pr_review
        env:
          GITHUB_TOKEN: '${{ secrets.GITHUB_TOKEN || github.token }}'
          ISSUE_TITLE: '${{ github.event.pull_request.title || github.event.issue.title }}'
          ISSUE_BODY: '${{ github.event.pull_request.body || github.event.issue.body }}'
          PULL_REQUEST_NUMBER: '${{ github.event.pull_request.number || github.event.issue.number }}'
          REPOSITORY: '${{ github.repository }}'
          ADDITIONAL_CONTEXT: '${{ inputs.additional_context }}'
          GEMINI_API_KEY: '${{ secrets.GEMINI_API_KEY }}'
          GEMINI_CLI_TRUST_WORKSPACE: 'true'
        with:
          gemini_api_key: '${{ secrets.GEMINI_API_KEY }}'
          upload_artifacts: false
          workflow_name: 'gemini-review'
          github_pr_number: '${{ github.event.pull_request.number || github.event.issue.number }}'
          settings: |-
            {
              "model": {
                "maxSessionTurns": 80
              }
            }
          prompt: 'Review this PR for critical bugs, security issues, and logic errors. Focus on Rust-specific issues: unwrap/expect panics, unsafe blocks, crypto misuse, resource leaks. Ignore naming and formatting. Post inline comments on problematic lines. Be concise.'
