name: Codex PR Review

on:
  pull_request:
    types: [labeled]
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  review:
    if: >-
      (github.event_name == 'pull_request' && github.event.label.name == 'codex-review') ||
      (github.event_name == 'issue_comment' &&
       github.event.issue.pull_request &&
       contains(github.event.comment.body, '@codex'))
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Codex Review
        uses: p2achAI/codex-reviewer@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          openai_api_key: ${{ secrets.OPENAI_API_KEY }}
          model: "gpt-4o"
          language: "chinese"
          custom_prompt: "审查重点：1) 关键逻辑错误和安全漏洞（加密误用、密钥泄露）2) panic风险和unsafe代码问题 3) Rust最佳实践。不要提代码风格问题（clippy/rustfmt负责）。如果代码逻辑正确，明确回复 'LGTM'。"
